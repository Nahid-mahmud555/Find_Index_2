<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find_Index | Smart Library</title>
    
    <!-- Preconnect for speed -->
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap');

        :root {
            --brand-primary: #6366f1;
            --brand-secondary: #a855f7;
            --brand-accent: #10b981;
            --bg-light: #fdfdfd;
            --bg-dark: #020617;
        }

        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .font-display { font-family: 'Outfit', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }

        .glass-premium {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        .dark .glass-premium {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        .text-gradient {
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform, opacity;

        .card-hover:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.12);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.2);
            border-radius: 10px;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .animate-float { animation: float 4s ease-in-out infinite; }

        /* GPU Acceleration */
        .gpu {
            transform: translateZ(0);
            backface-visibility: hidden;
            perspective: 1000px;
        }

        /* Skeleton Loading Animation */
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #f8f8f8 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }
        .dark .skeleton {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
        }

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            primary: '#6366f1',
                            secondary: '#a855f7',
                            accent: '#10b981',

                        bg: {

<body class="bg-bg-light dark:bg-bg-dark text-slate-900 dark:text-slate-100 overflow-x-hidden custom-scrollbar">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback, memo } = React;
        const { motion, AnimatePresence } = window.Motion || { motion: { div: 'div' }, AnimatePresence: ({ children }) => children };

        // --- Supabase Configuration ---
        const SUPABASE_URL = "https://edtsidlxnwysazyzkahu.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_dFVu4MM0z_7qbkypUx-goQ_MCixc5qn";

        let supabase = null;
        try {
            if (SUPABASE_URL && SUPABASE_URL.startsWith("http")) {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
        } catch (e) {
            console.error("Supabase Init Error:", e);
        }

        // --- Optimized Icon Component ---
        // Using a debounced global update to prevent multiple createIcons calls
        let iconTimeout;
        const updateIcons = () => {
            clearTimeout(iconTimeout);
            iconTimeout = setTimeout(() => {
                if (window.lucide) window.lucide.createIcons();
            }, 50);
        };

        const Icon = memo(({ name, size = 20, className = "" }) => {
            useEffect(() => {
                updateIcons();
            }, [name]);
            return <i data-lucide={name} className={`${className} shrink-0`} style={{ width: size, height: size }}></i>;
        });

        const Badge = memo(({ children, className = "" }) => (
            <span className={`inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-[10px] font-mono font-bold tracking-wider uppercase border ${className}`}>
                {children}
            </span>
        ));

        const Modal = memo(({ isOpen, onClose, title, children }) => {
            useEffect(() => {
                if (isOpen) document.body.style.overflow = 'hidden';
                else document.body.style.overflow = '';
                return () => { document.body.style.overflow = ''; };
            }, [isOpen]);

            return (
                <AnimatePresence>
                    {isOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                            <motion.div 
                                initial={{ opacity: 0 }}
                                animate={{ opacity: 1 }}
                                exit={{ opacity: 0 }}
                                onClick={onClose}
                                className="fixed inset-0 bg-slate-950/40 backdrop-blur-md"
                            />
                            <motion.div 
                                initial={{ opacity: 0, scale: 0.95, y: 10 }}
                                animate={{ opacity: 1, scale: 1, y: 0 }}
                                exit={{ opacity: 0, scale: 0.95, y: 10 }}
                                transition={{ type: 'spring', damping: 25, stiffness: 400 }}
                                className="relative w-full max-w-lg glass-premium rounded-[2.5rem] overflow-hidden shadow-2xl flex flex-col max-h-[90vh] border border-white/20 dark:border-white/10 gpu"
                            >
                                <div className="p-8 pb-4 flex items-center justify-between shrink-0">
                                    <h3 className="text-xl font-display font-bold text-slate-900 dark:text-white">{title}</h3>
                                    <button 
                                        onClick={onClose} 
                                        className="w-10 h-10 flex items-center justify-center hover:bg-slate-100 dark:hover:bg-white/10 rounded-full transition-all text-slate-400 hover:text-slate-900 dark:hover:text-white"
                                    >
                                        <Icon name="x" size={20} />
                                    </button>
                                </div>
                                <div className="p-8 pt-4 overflow-y-auto flex-1 custom-scrollbar">
                                    {children}
                                </div>
                            </motion.div>
                        </div>
                    )}
                </AnimatePresence>
            );
        });

        const BookCard = memo(({ book, counts, myVote, onVote, onDetail, onMap }) => {
            const total = counts.like + counts.dislike;
            const likePct = total ? Math.round((counts.like / total) * 100) : 50;
            const isCSE = (book.Category || '').toLowerCase().includes('cse');
            const isBBA = (book.Category || '').toLowerCase().includes('bba') || (book.Category || '').toLowerCase().includes('bus');

            return (
                <motion.div 
                    layout="position"
                    initial={{ opacity: 0 }}
                    animate={{ opacity: 1 }}
                    className="card-hover glass-premium rounded-[2rem] p-8 flex flex-col gap-6 group gpu"
                >
                    <div className="flex justify-between items-start">
                        <Badge className={
                            isCSE ? "bg-indigo-500/10 text-indigo-500 border-indigo-500/20" :
                            isBBA ? "bg-cyan-500/10 text-cyan-500 border-cyan-500/20" :
                            "bg-emerald-500/10 text-emerald-500 border-emerald-500/20"
                        }>
                            {book.Category || 'General'}
                        </Badge>
                        <button 
                            onClick={() => onMap(book.Rack)}
                            className="p-2.5 hover:bg-brand-primary/10 rounded-xl transition-colors text-slate-400 hover:text-brand-primary"
                        >
                            <Icon name="map" size={18} />
                        </button>
                    </div>

                    <div className="flex-1">
                        <h3 className="text-xl font-display font-bold leading-tight mb-2 group-hover:text-brand-primary transition-colors line-clamp-2">
                            {book.Title}
                        </h3>
                        <p className="text-sm text-slate-500 dark:text-slate-400 font-medium truncate">✍️ {book.Author || 'Unknown Author'}</p>
                    </div>

                    <div className="space-y-4">
                        <div className="space-y-2">
                            <div className="flex justify-between text-[10px] font-mono font-bold uppercase tracking-wider">
                                <span className="text-brand-accent">Likes: {counts.like}</span>
                                <span className="text-red-500">Dislikes: {counts.dislike}</span>
                            </div>
                            <div className="h-1.5 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
                                <motion.div 
                                    initial={{ width: 0 }}
                                    animate={{ width: `${likePct}%` }}
                                    transition={{ duration: 0.8, ease: "easeOut" }}
                                    className="h-full bg-gradient-to-r from-brand-accent to-brand-secondary"
                                />
                            </div>
                        </div>

                        <div className="grid grid-cols-2 gap-3">
                            <button 
                                onClick={() => onVote(book.Title, 'like')}
                                className={`flex items-center justify-center gap-2 py-3 rounded-2xl text-xs font-bold transition-all border ${
                                    myVote === 'like' 
                                        ? "bg-brand-accent/10 border-brand-accent text-brand-accent shadow-lg shadow-brand-accent/20" 
                                        : "border-slate-200 dark:border-white/5 hover:bg-brand-accent/5 hover:border-brand-accent/30 text-slate-500"
                                }`}
                            >
                                <Icon name="thumbs-up" size={14} /> Like
                            </button>
                            <button 
                                onClick={() => onVote(book.Title, 'dislike')}
                                className={`flex items-center justify-center gap-2 py-3 rounded-2xl text-xs font-bold transition-all border ${
                                    myVote === 'dislike' 
                                        ? "bg-red-500/10 border-red-500 text-red-500 shadow-lg shadow-red-500/20" 
                                        : "border-slate-200 dark:border-white/5 hover:bg-red-500/5 hover:border-red-500/30 text-slate-500"
                                }`}
                            >
                                <Icon name="thumbs-down" size={14} /> Dislike
                            </button>
                        </div>

                        <button 
                            onClick={() => onDetail(book)}
                            className="w-full py-4 rounded-2xl bg-slate-900 dark:bg-white text-white dark:text-slate-900 hover:bg-brand-primary hover:text-white dark:hover:bg-brand-primary transition-all text-sm font-bold flex items-center justify-center gap-2"
                        >
                            <Icon name="book-open" size={18} /> View Details
                        </button>
                    </div>
                </motion.div>
            );
        });

        function App() {
            const [isDarkMode, setIsDarkMode] = useState(() => {
                return localStorage.getItem('theme') === 'dark' || 
                    (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
            });

            const [books, setBooks] = useState(() => JSON.parse(localStorage.getItem('fi_books') || '[]'));
            const [exchanges, setExchanges] = useState([]);
            const [voteCounts, setVoteCounts] = useState({});
            const [myVotes, setMyVotes] = useState(() => JSON.parse(localStorage.getItem('fi_votes') || '{}'));
            const [loading, setLoading] = useState(true);
            const [searchQuery, setSearchQuery] = useState('');
            const [activeTab, setActiveTab] = useState('all');
            const [selectedDept, setSelectedDept] = useState('all');
            
            const [isDetailModalOpen, setIsDetailModalOpen] = useState(false);
            const [selectedBook, setSelectedBook] = useState(null);
            const [isMapModalOpen, setIsMapModalOpen] = useState(false);
            const [selectedRack, setSelectedRack] = useState('');
            const [isRequestModalOpen, setIsRequestModalOpen] = useState(false);
            const [isExchangeModalOpen, setIsExchangeModalOpen] = useState(false);
            const [isQuizModalOpen, setIsQuizModalOpen] = useState(false);
            
            const [exForm, setExForm] = useState({ type: 'দিতে চাই', bookName: '', author: '', dept: '', summary: '', contact: '' });
            const [reqForm, setReqForm] = useState({ name: '', number: '', bookName: '', dept: '', semester: '' });
            const [isSubmittingEx, setIsSubmittingEx] = useState(false);
            const [isSubmittingReq, setIsSubmittingReq] = useState(false);
            const [quizStep, setQuizStep] = useState(1);
            const [quizAnswers, setQuizAnswers] = useState({});

            // --- Optimized Handlers ---
            const toggleTheme = useCallback(() => setIsDarkMode(prev => !prev), []);

            const handleVote = useCallback(async (bookTitle, type) => {
                const prevVote = myVotes[bookTitle];
                const newVotes = { ...myVotes };
                const newCounts = { ...voteCounts };
                if (!newCounts[bookTitle]) newCounts[bookTitle] = { like: 0, dislike: 0 };
                
                if (prevVote === type) {
                    newVotes[bookTitle] = null;
                    newCounts[bookTitle][type] = Math.max(0, newCounts[bookTitle][type] - 1);
                } else {
                    if (prevVote) newCounts[bookTitle][prevVote] = Math.max(0, newCounts[bookTitle][prevVote] - 1);
                    newVotes[bookTitle] = type;
                    newCounts[bookTitle][type]++;
                }
                
                setMyVotes(newVotes);
                setVoteCounts(newCounts);
                localStorage.setItem('fi_votes', JSON.stringify(newVotes));

                if (supabase) {
                    try {
                        await supabase.from('votes').upsert({ 
                            book_title: bookTitle, 
                            likes: newCounts[bookTitle].like, 
                            dislikes: newCounts[bookTitle].dislike 
                        }, { onConflict: 'book_title' });
                    } catch (err) { console.error('Vote sync failed:', err); }
                }
            }, [myVotes, voteCounts]);

            const handleDetail = useCallback((book) => {
                setSelectedBook(book);
                setIsDetailModalOpen(true);
            }, []);

            const handleMap = useCallback((rack) => {
                setSelectedRack(rack || '');
                setIsMapModalOpen(true);
            }, []);

            // --- Data Fetching ---
            useEffect(() => {
                document.documentElement.classList.toggle('dark', isDarkMode);
                localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
            }, [isDarkMode]);

            useEffect(() => {
                const fetchData = async () => {
                    if (!supabase) {
                        setLoading(false);
                        return;
                    }
                    try {
                        const [booksRes, votesRes, exRes] = await Promise.all([
                            supabase.from('books').select('*'),
                            supabase.from('votes').select('*'),
                            supabase.from('exchanges').select('*').order('created_at', { ascending: false })
                        ]);

                        if (booksRes.data) {
                            const mapped = booksRes.data.map(b => ({
                                Title: b.title, Author: b.author, Edition: b.edition,
                                Category: b.category, Rack: b.rack, Summary: b.summary
                            }));
                            setBooks(mapped);
                            localStorage.setItem('fi_books', JSON.stringify(mapped));
                        }

                        if (votesRes.data) {
                            const counts = {};
                            votesRes.data.forEach(v => {
                                counts[v.book_title] = { like: v.likes || 0, dislike: v.dislikes || 0 };
                            });
                            setVoteCounts(counts);
                        }

                        if (exRes.data) {
                            const mappedEx = exRes.data.map(e => ({
                                Type: e.type, bookName: e.book_name, author: e.author,
                                dept: e.dept, summary: e.summary, contact: e.contact
                            }));
                            setExchanges(mappedEx);
                        }
                    } catch (err) {
                        console.error('Fetch error:', err);
                    } finally {
                        setLoading(false);
                    }
                };

                fetchData();
            }, []);

            // --- Memoized Logic ---
            const filteredBooks = useMemo(() => {
                let result = books;
                if (selectedDept !== 'all') {
                    result = result.filter(b => {
                        const cat = (b.Category || '').toLowerCase();
                        if (selectedDept === 'CSE') return cat.includes('cse');
                        if (selectedDept === 'BBA') return cat.includes('bba') || cat.includes('bus');
                        if (selectedDept === 'Other') return !cat.includes('cse') && !cat.includes('bba') && !cat.includes('bus');
                        return true;
                    });
                }
                if (searchQuery.trim()) {
                    const q = searchQuery.toLowerCase();
                    result = result.filter(b => 
                        (b.Title || '').toLowerCase().includes(q) || 
                        (b.Author || '').toLowerCase().includes(q) || 
                        (b.Category || '').toLowerCase().includes(q)
                    );
                }
                return result;
            }, [books, selectedDept, searchQuery]);

            const topLikedBooks = useMemo(() => {
                return Object.entries(voteCounts)
                    .filter(([, v]) => v.like > 0)
                    .sort((a, b) => b[1].like - a[1].like)
                    .slice(0, 5)
                    .map(([title]) => books.find(b => b.Title === title))
                    .filter(Boolean);
            }, [books, voteCounts]);

            const handleExchangeSubmit = async (e) => {
                e.preventDefault();
                if (!supabase) return alert('Supabase not configured');
                setIsSubmittingEx(true);
                try {
                    const { error } = await supabase.from('exchanges').insert([{
                        type: exForm.type, book_name: exForm.bookName, author: exForm.author,
                        dept: exForm.dept, summary: exForm.summary, contact: exForm.contact
                    }]);
                    if (error) throw error;
                    setExchanges(prev => [{ ...exForm, Type: exForm.type }, ...prev]);
                    setExForm({ type: 'দিতে চাই', bookName: '', author: '', dept: '', summary: '', contact: '' });
                    setIsExchangeModalOpen(false);
                } catch (err) { console.error(err); } finally { setIsSubmittingEx(false); }
            };

            const handleRequestSubmit = async (e) => {
                e.preventDefault();
                if (!supabase) return alert('Supabase not configured');
                setIsSubmittingReq(true);
                try {
                    const { error } = await supabase.from('requests').insert([{
                        name: reqForm.name, number: reqForm.number, book_name: reqForm.bookName,
                        dept: reqForm.dept, semester: reqForm.semester
                    }]);
                    if (error) throw error;
                    setIsRequestModalOpen(false);
                    setReqForm({ name: '', number: '', bookName: '', dept: '', semester: '' });
                    alert('Request submitted!');
                } catch (err) { console.error(err); } finally { setIsSubmittingReq(false); }
            };

            const handleQuizAnswer = (step, val) => {
                setQuizAnswers(prev => ({ ...prev, [step]: val }));
                if (step < 4) setQuizStep(step + 1);
                else setQuizStep(5);
            };

            const getQuizRecommendations = () => {
                const a = quizAnswers;
                return books.map(b => {
                    let s = 0;
                    const c = (b.Category || '').toLowerCase();
                    if (a[1] === 'tech' && c.includes('cse')) s += 3;
                    if (a[1] === 'business' && c.includes('bba')) s += 3;
                    if (a[2] === 'beginner') s += 1;
                    if (a[2] === 'advanced') s += 2;
                    s += (voteCounts[b.Title]?.like || 0) * 0.5;
                    return { book: b, score: s };
                }).sort((a, b) => b.score - a.score).slice(0, 4);
            };

            return (
                <div className="min-h-screen selection:bg-brand-primary selection:text-white">
                    {/* Background */}
                    <div className="fixed inset-0 pointer-events-none z-0 overflow-hidden">
                        <div className="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-brand-primary/5 blur-[120px] rounded-full animate-pulse" />
                        <div className="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-brand-secondary/5 blur-[120px] rounded-full animate-pulse delay-1000" />
                        <div className="absolute inset-0 bg-[linear-gradient(to_right,#8080800a_1px,transparent_1px),linear-gradient(to_bottom,#8080800a_1px,transparent_1px)] bg-[size:32px_32px]" />
                    </div>

                    {/* Nav */}
                    <nav className="relative z-50 flex justify-between items-center px-6 py-6 max-w-7xl mx-auto">
                        <motion.div initial={{ opacity: 0, x: -20 }} animate={{ opacity: 1, x: 0 }} className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-xl bg-brand-primary flex items-center justify-center shadow-lg shadow-brand-primary/30">
                                <Icon name="library" size={22} className="text-white" />
                            </div>
                            <span className="font-display font-bold text-xl tracking-tight">Find_Index</span>
                        </motion.div>
                        <motion.button initial={{ opacity: 0, x: 20 }} animate={{ opacity: 1, x: 0 }} onClick={toggleTheme} className="glass-premium p-3 rounded-2xl hover:scale-110 transition-transform">
                            {isDarkMode ? <Icon name="sun" size={20} className="text-yellow-400" /> : <Icon name="moon" size={20} className="text-brand-primary" />}
                        </motion.button>
                    </nav>

                    {/* Hero */}
                    <header className="relative z-10 max-w-4xl mx-auto px-6 pt-12 pb-16 text-center">
                        <motion.div initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} className="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-brand-primary/10 border border-brand-primary/20 mb-8">
                            <span className="w-2 h-2 rounded-full bg-brand-primary animate-ping" />
                            <span className="text-[10px] font-mono font-bold tracking-widest uppercase text-brand-primary">Smart Library v8.0</span>
                        </motion.div>
                        <motion.h1 initial={{ opacity: 0, scale: 0.95 }} animate={{ opacity: 1, scale: 1 }} className="text-6xl md:text-8xl font-display font-extrabold tracking-tighter mb-6 text-gradient">Find_Index</motion.h1>
                        <motion.p initial={{ opacity: 0 }} animate={{ opacity: 1 }} transition={{ delay: 0.2 }} className="text-slate-500 dark:text-slate-400 text-lg max-w-2xl mx-auto leading-relaxed">
                            A small gift for VU students from <span className="font-bold text-brand-primary">MN Group</span>. 
                            Discover, exchange, and explore books with ease.
                        </motion.p>
                    </header>

                    {/* Search & Actions */}
                    <section className="relative z-10 max-w-6xl mx-auto px-6 mb-16">
                        <div className="flex flex-wrap justify-center gap-4 mb-10">
                            <div className="glass-premium px-6 py-3 rounded-2xl flex items-center gap-3 text-sm font-bold">
                                <Icon name="trending-up" size={18} className="text-brand-accent" />
                                <span>{books.length} Books Available</span>
                            </div>
                            <button onClick={() => setIsRequestModalOpen(true)} className="bg-brand-primary text-white px-8 py-3 rounded-2xl text-sm font-bold hover:scale-105 transition-transform shadow-xl shadow-brand-primary/25 flex items-center gap-2">
